name: Actions Caller
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  call-greeter:
    runs-on: ubuntu-latest
    steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Call Greeter Action
          uses: vMarioDev/azure_aviatrix_spoke_deployment_second_pipeline/actions/greeter@main  # useername/repository@branch
          with: 
            name_to_greet: everyone # input name defined in action.yml
        
        - name:  Call Check Breakout Action
          uses: vMarioDev/azure_aviatrix_spoke_deployment_second_pipeline/actions/check_breakout@main  # useername/repository@branch
          
         

        